<div class="flex items-start gap-2">
  <div class="w-8 h-8 rounded-full bg-brand-500 text-white grid place-items-center text-xs shrink-0">AI</div>
  <div class="max-w-[85%] space-y-2">
    <div class="bg-slate-100 text-slate-800 px-3.5 py-2 rounded-2xl rounded-bl-sm text-sm whitespace-pre-wrap">{{ reply }}</div>
    {% if books %}
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
        {% for b in books %}
          <a href="/books?q={{ b.title|urlencode }}" class="card p-3 flex gap-3 hover:border-brand-300 border border-transparent">
            <div class="w-10 shrink-0">
              {% if b.cover_url %}
                <img src="{{ b.cover_url }}" class="w-10 h-14 object-cover rounded" onerror="this.style.display='none'">
              {% else %}
                <div class="w-10 h-14 rounded bg-brand-50 text-brand-600 grid place-items-center font-semibold text-xs">{{ b.title|initials }}</div>
              {% endif %}
            </div>
            <div class="min-w-0">
              <div class="font-medium text-sm truncate">{{ b.title }}</div>
              <div class="text-xs text-slate-500 truncate">{{ b.author }}</div>
              {% if b.genre %}<span class="chip mt-1 inline-block">{{ b.genre }}</span>{% endif %}
              <div class="text-xs mt-1 {% if b.available_copies > 0 %}text-emerald-600{% else %}text-rose-600{% endif %}">
                {% if b.available_copies > 0 %}Available{% else %}Checked out{% endif %}
              </div>
            </div>
          </a>
        {% endfor %}
      </div>
    {% endif %}
  </div>
</div>
